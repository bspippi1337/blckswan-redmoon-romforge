plugins { id 'com.android.application' }
android {
    namespace 'os.blckswan.about'
    compileSdk 35

    defaultConfig {
        applicationId 'os.blckswan.about'
        minSdk 26
        targetSdk 35
        versionCode 42
        versionName '42.0-redmoon'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
